name: Check forbidden files

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  forbidden-files:
    name: Check forbidden files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check forbidden files
        shell: bash
        run: bash scripts/check-forbidden-files.sh
