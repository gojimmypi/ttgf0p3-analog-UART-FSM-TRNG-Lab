name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Read top module name
        id: top_module
        shell: bash
        run: |
          set -euo pipefail

          TOP_MODULE="$(sed -n 's/^[[:space:]]*top_module:[[:space:]]*"\?\([^"]*\)"\?[[:space:]]*$/\1/p' info.yaml)"
          if [ -z "${TOP_MODULE}" ]; then
              echo "::error::Could not find project.top_module in info.yaml"
              exit 1
          fi

          echo "TOP_MODULE=${TOP_MODULE}" | tee "${GITHUB_OUTPUT}"


      - name: Build custom-GDS Verilog model
        run: |
          python3 tools/build_custom_gds_verilog.py --out build/custom_gds/project.v
          grep -Eq '^ *`include +' build/custom_gds/project.v && echo "BAD: include remains" && exit 1 || echo "OK: no active includes"
          wc -l build/custom_gds/project.v
          grep -n "module ${{ steps.top_module.outputs.TOP_MODULE }}" build/custom_gds/project.v

      - name: Check analog RTL diagnostics
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_V="build/custom_gds/project.v"
          echo "Checking analog experiment RTL diagnostics in ${PROJECT_V}"

          require_grep() {
              local label="$1"
              local pattern="$2"

              echo "Check: ${label}"
              if ! grep -nE "${pattern}" "${PROJECT_V}"; then
                  echo "::error::Missing analog RTL diagnostic: ${label}"
                  echo "Pattern: ${pattern}"
                  exit 1
              fi
          }

          require_grep "ANALOG_ENABLED define" '^[[:space:]]*`define[[:space:]]+ANALOG_ENABLED([[:space:]]|$)'
          require_grep "BIG16_SPI_REG define" '^[[:space:]]*`define[[:space:]]+BIG16_SPI_REG([[:space:]]|$)'

          require_grep "RE analog_status UART readback" 'SPI_REG_ADDR_ANALOG_(STAT|STATUS)[[:space:]]*:[[:space:]]*read_reg[[:space:]]*=[[:space:]]*analog_status[[:space:]]*;'
          require_grep "RF analog_measure UART readback" 'SPI_REG_ADDR_ANALOG_MEAS[[:space:]]*:[[:space:]]*read_reg[[:space:]]*=[[:space:]]*analog_measure[[:space:]]*;'
          require_grep "0xE analog_status SPI readback" 'SPI_REG_ADDR_ANALOG_(STAT|STATUS)[[:space:]]*:[[:space:]]*spi_reg_rdata[[:space:]]*=[[:space:]]*analog_status[[:space:]]*;'
          require_grep "0xF analog_measure SPI readback" 'SPI_REG_ADDR_ANALOG_MEAS[[:space:]]*:[[:space:]]*spi_reg_rdata[[:space:]]*=[[:space:]]*analog_measure[[:space:]]*;'

          require_grep "analog experiment instance" 'analog_experiment_stub[[:space:]]+u_analog_experiment'
          require_grep "analog_status port connection" '\.analog_status\(analog_status\)'
          require_grep "analog_measure port connection" '\.analog_measure\(analog_measure\)'
          require_grep "analog_measure driven by probe measurement" 'assign[[:space:]]+analog_measure[[:space:]]*=[[:space:]]*probe_[[:alnum:]_]*q[[:space:]]*;'

          echo "Optional non-analog fallback assignments:"
          grep -Fn "assign analog_status = 8'h00;" "${PROJECT_V}" || true
          grep -Fn "assign analog_measure = 8'h00;" "${PROJECT_V}" || true

      - name: Check custom analog submission files
        run: |
          TOP="${{ steps.top_module.outputs.TOP_MODULE }}"

          echo "TOP_MODULE=${TOP}"
          echo "Expected custom GDS: gds/${TOP}.gds"
          echo "Expected custom LEF: lef/${TOP}.lef"
          echo "Expected generated Verilog model: build/custom_gds/project.v"

          test -f "gds/${TOP}.gds"
          test -f "lef/${TOP}.lef"
          test -f "build/custom_gds/project.v"

          cat "build/custom_gds/project.v"

          python3 tools/check_gds_content.py "gds/${TOP}.gds"

      - name: Create and publish the custom GDS artifact
        uses: TinyTapeout/tt-gds-action/custom_gds@ttgf26a
        with:
          top_module: ${{ steps.top_module.outputs.TOP_MODULE }}
          gds_path: gds/${{ steps.top_module.outputs.TOP_MODULE }}.gds
          lef_path: lef/${{ steps.top_module.outputs.TOP_MODULE }}.lef
          verilog_path: build/custom_gds/project.v
          pdk: gf180mcuD

      - name: Add PDK metadata for gl_test
        run: |
          # JSON replacements....
          jq \
            --arg pdk_source "ciel" \
            --arg pdk_version "e8daeda73ca8f5814dbc0b11d1d05802251a3750" \
            ". + {\"PDK_SOURCE\": \$pdk_source, \"PDK_VERSION\": \$pdk_version}" \
            tt_submission/pdk.json > tt_submission/pdk.json.tmp
          echo "tt_submission/pdk.json peek:"
          mv tt_submission/pdk.json.tmp tt_submission/pdk.json
          cat tt_submission/pdk.json

      - name: Re-publish tt_submission artifact for gl_test
        uses: actions/upload-artifact@v7
        with:
          name: tt_submission
          overwrite: true
          path: |
            info.yaml
            LICENSE
            docs/*
            tt_submission/*

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttgf26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttgf26a

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttgf26a
