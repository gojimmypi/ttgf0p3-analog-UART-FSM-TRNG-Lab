name: harden-gds-lef

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/harden-gds-lef.yaml"
      - "tools/full_harden_artifact.sh"
      - "tools/patch_full_harden_source.py"
      - "tools/patch_full_harden_config.py"
      - "tools/strip_unused_analog_pins.py"
      - "tools/check_gds_content.py"
      - "mag/*.def"
      - "mag/*.mag"
      - "src/**"
      - "info.yaml"
      - "openlane/**"
      - "config.tcl"
      - "macro.cfg"

permissions:
  contents: read

jobs:
  harden:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      PDK: gf180mcuD
      PDK_ROOT: ${{ github.workspace }}/.pdk
      TT_TOOL: ${{ github.workspace }}/tt/tt_tool.py
      ARTIFACT_DIR: ${{ github.workspace }}/build/hardened-gds-lef
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Tiny Tapeout tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3-pip

          if [ ! -d tt ]; then
            git clone --depth 1 https://github.com/TinyTapeout/tt-support-tools tt
          fi

          python3 -m pip install --upgrade pip
          python3 -m pip install -r tt/requirements.txt
          python3 -m pip install librelane==2.4.2
          python3 -m pip install gdstk

          docker --version
          test -d tt/.git
          python3 "${TT_TOOL}" --help >/dev/null

      - name: Check analog RTL diagnostics
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/analog-rtl-diagnostics
          PROJECT_V="build/analog-rtl-diagnostics/project.v"

          python3 tools/build_custom_gds_verilog.py --out "${PROJECT_V}"
          grep -Eq '^ *`include +' "${PROJECT_V}" && echo "BAD: include remains" && exit 1 || echo "OK: no active includes"
          wc -l "${PROJECT_V}"

          echo "Checking analog experiment RTL diagnostics in ${PROJECT_V}"

          require_grep() {
              local label="$1"
              local pattern="$2"

              echo "Check: ${label}"
              if ! grep -nE "${pattern}" "${PROJECT_V}"; then
                  echo "::error::Missing analog RTL diagnostic: ${label}"
                  echo "Pattern: ${pattern}"
                  exit 1
              fi
          }

          require_grep "ANALOG_ENABLED define" '^[[:space:]]*`define[[:space:]]+ANALOG_ENABLED([[:space:]]|$)'
          require_grep "BIG16_SPI_REG define" '^[[:space:]]*`define[[:space:]]+BIG16_SPI_REG([[:space:]]|$)'

          require_grep "RE analog_status UART readback" 'SPI_REG_ADDR_ANALOG_(STAT|STATUS)[[:space:]]*:[[:space:]]*read_reg[[:space:]]*=[[:space:]]*analog_status[[:space:]]*;'
          require_grep "RF analog_measure UART readback" 'SPI_REG_ADDR_ANALOG_MEAS[[:space:]]*:[[:space:]]*read_reg[[:space:]]*=[[:space:]]*analog_measure[[:space:]]*;'
          require_grep "0xE analog_status SPI readback" 'SPI_REG_ADDR_ANALOG_(STAT|STATUS)[[:space:]]*:[[:space:]]*spi_reg_rdata[[:space:]]*=[[:space:]]*analog_status[[:space:]]*;'
          require_grep "0xF analog_measure SPI readback" 'SPI_REG_ADDR_ANALOG_MEAS[[:space:]]*:[[:space:]]*spi_reg_rdata[[:space:]]*=[[:space:]]*analog_measure[[:space:]]*;'

          require_grep "analog experiment instance" 'analog_experiment_stub[[:space:]]+u_analog_experiment'
          require_grep "analog_status port connection" '\.analog_status\(analog_status\)'
          require_grep "analog_measure port connection" '\.analog_measure\(analog_measure\)'
          require_grep "analog_measure driven by probe measurement" 'assign[[:space:]]+analog_measure[[:space:]]*=[[:space:]]*probe_[[:alnum:]_]*q[[:space:]]*;'

          echo "Optional non-analog fallback assignments:"
          grep -Fn "assign analog_status = 8'h00;" "${PROJECT_V}" || true
          grep -Fn "assign analog_measure = 8'h00;" "${PROJECT_V}" || true

      - name: Harden and collect GDS/LEF
        run: |
          set -euo pipefail

          chmod +x tools/full_harden_artifact.sh
          ./tools/full_harden_artifact.sh 2>&1 | tee harden-gds-lef.log

          mkdir -p "${ARTIFACT_DIR}"
          cp -f harden-gds-lef.log "${ARTIFACT_DIR}/harden-gds-lef.log"

      - name: Show generated files
        if: always()
        run: |
          TOP="$(sed -n 's/^[[:space:]]*top_module:[[:space:]]*"?\([^"]*\)"?[[:space:]]*$/\1/p' info.yaml)"
          echo "TOP=${TOP}"
          ls -lh "gds/${TOP}.gds" "lef/${TOP}.lef" 2>/dev/null || true
          find build/hardened-gds-lef -maxdepth 3 -type f -print -exec ls -lh {} \; 2>/dev/null || true
          test -f harden-gds-lef.log && tail -200 harden-gds-lef.log || true

      - name: Upload hardened GDS/LEF artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: hardened-gds-lef
          if-no-files-found: error
          retention-days: 14
          path: |
            build/hardened-gds-lef/gds/*.gds
            build/hardened-gds-lef/lef/*.lef
            build/hardened-gds-lef/harden-gds-lef.log

      - name: Upload harden debug logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: harden-gds-lef-debug
          if-no-files-found: warn
          retention-days: 14
          path: |
            harden-gds-lef.log
            runs/**
            build/full_harden/**
            build/analog-rtl-diagnostics/**
