# Tiny Tapeout project information
project:
  title:        "Hardware Entropy Explorer: UART/SPI TRNG and PUF (Analog)"      # Project title
  author:       "gojimmypi"      # Your name
  discord:      "gojimmypi"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "UART/SPI-controlled GF180 analog lab with DAC, threshold sampling, TRNG monitors, and measured ua5 passive probe."      # One line description of what your project does
  language:     "Analog"        # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     25000000         # Clock frequency in Hz (or 0 if not applicable); note tests such as ULX3S can specify 50MHz

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x2"          # Analog projects must be 1x2 or larger

  # GF 0p3 analog experiment: use all six available analog pins.
  analog_pins: 6
  uses_vapwr: false

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_gojimmypi_ttgfa_UART_FSM_TRNG_Lab_analog"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  # Files for this project are included explicitly in project.v for TT builds.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
# Inputs
  ui[0]: "reserved_in0"        # Currently unused by RTL
  ui[1]: "reserved_in1"        # Currently unused by RTL
  ui[2]: "reserved_in2"        # Currently unused by RTL
  ui[3]: "uart_rx"             # UART receive input to the core
  ui[4]: "spi_jtag_sel"        # SPI/JTAG select input; 0 = SPI default (SW4 up/off), 1 = JTAG (SW4 down/on) on TT boards
  ui[5]: "reserved_in5"        # Currently unused by RTL
  ui[6]: "reserved_in6"        # Currently unused by RTL
  ui[7]: "reserved_in7"        # Currently unused by RTL

  # Outputs
  uo[0]: "trng_bit"            # Raw/sample TRNG bit output
  uo[1]: "status0"             # reg_status[0]
  uo[2]: "status1"             # reg_status[1]
  uo[3]: "status2"             # reg_status[2]
  uo[4]: "uart_tx"             # UART transmit output from the core
  uo[5]: "rawlo0"              # reg_rawlo[0]
  uo[6]: "rawlo1"              # reg_rawlo[1]
  uo[7]: "rawlo2"              # reg_rawlo[2]

  # Bidirectional pins
  uio[0]: "spi_cs_n_jtag_tms"  # SPI chip-select input, active low
  uio[1]: "spi_mosi_jtag_tdi"  # SPI MOSI input
  uio[2]: "spi_miso_jtag_tdo"  # SPI MISO output
  uio[3]: "spi_sck_jtag_tck"   # SPI clock input
  uio[4]: "rawhi4"             # reg_rawhi[4] output
  uio[5]: "rawhi5"             # reg_rawhi[5] output
  uio[6]: "rawhi6"             # reg_rawhi[6] output
  uio[7]: "rawhi7"             # reg_rawhi[7] output

  # Analog pins - analog_pins must match the used ua pins.
  ua[0]: "ain_ext"             # External analog stimulus/noise input
  ua[1]: "dac_out"             # DAC monitor output
  ua[2]: "cmp_ref_ext"         # External comparator/reference input
  ua[3]: "amon_out"            # Analog monitor mux output
  ua[4]: "osc_out"             # Oscillator monitor output
  ua[5]: "puf_probe"           # PUF/noise probe pad with measured on-chip Metal4 passive

# Do not change!
yaml_version: 6
